    /* ── Login card ── */
    .login-card {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 6px;
      width: 100%;
      max-width: 360px;
      padding: 40px 36px 32px;
      box-shadow:
        0 2px 4px rgba(0,0,0,.06),
        0 8px 24px rgba(0,0,0,.12),
        0 32px 64px rgba(0,0,80,.18);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Logo area ── */
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo-title {
      font-family: var(--font);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .login-logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── Divider ── */
    .login-divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 0 -36px 24px;
    }

    /* ── Subtitle ── */
    .login-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* ── Form fields ── */
    .login-field {
      width: 100%;
      height: 42px;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 13px;
      color: #222;
      outline: none;
      margin-bottom: 10px;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }
    .login-field::placeholder { color: #bbb; }
    .login-field:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,0,208,.1);
    }

    /* ── Submit button ── */
    .login-btn {
      width: 100%;
      height: 42px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover {
      background: var(--blue-dark);
      box-shadow: 0 4px 16px rgba(0,0,208,.3);
    }
    .login-btn:active { transform: scale(.99); }

    /* Ripple on click */
    .login-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── Forgot link ── */
    .login-forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      margin-top: 10px;
      transition: color .15s;
    }
    .login-forgot:hover { color: var(--pink); text-decoration: underline; }

    /* ── Error message ── */
    .login-error {
      background: #fff0f3;
      border: 1px solid #ffc0cb;
      border-radius: 3px;
      padding: 10px 12px;
      font-size: 12px;
      color: #c00;
      margin-bottom: 12px;
      display: none;
      animation: shake .3s ease;
    }
    .login-error.visible { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    /* ── Footer logo ── */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .login-footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
    }

    .logo-wordmark {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: .06em;
    }

    .logo-wordmark span {
      color: var(--pink);
    }

    /* ── Loading state ── */
    .login-btn.loading {
      pointer-events: none;
      background: var(--blue-dark);
    }
    .login-btn.loading::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      top: 50%; left: 50%;
      margin: -8px 0 0 -8px;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

  <script>
    // Ripple effect
    document.getElementById("loginBtn").addEventListener("click", function(e) {
      const btn = this;
      const circle = document.createElement("span");
      circle.className = "ripple";
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      circle.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    });

    // Enter key submits
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });

    function handleLogin() {
      const user = document.getElementById("loginUser").value.trim();
      const pass = document.getElementById("loginPass").value;
      const btn  = document.getElementById("loginBtn");
      const err  = document.getElementById("loginError");

      if (!user || !pass) {
        err.textContent = "Por favor introduce usuario y contraseña.";
        err.classList.add("visible");
        return;
      }

      err.classList.remove("visible");
      btn.classList.add("loading");
      btn.textContent = "";

      // Simulate auth — replace with real call
      setTimeout(() => {
        btn.classList.remove("loading");
