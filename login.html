<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yako Card Builder · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Metropolis'; src:url('https://cdn.jsdelivr.net/gh/chrismsimpson/Metropolis@master/Fonts/Metropolis-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Metropolis'; src:url('https://cdn.jsdelivr.net/gh/chrismsimpson/Metropolis@master/Fonts/Metropolis-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Metropolis'; src:url('https://cdn.jsdelivr.net/gh/chrismsimpson/Metropolis@master/Fonts/Metropolis-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
    @font-face { font-family:'Metropolis'; src:url('https://cdn.jsdelivr.net/gh/chrismsimpson/Metropolis@master/Fonts/Metropolis-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #0000D0;
      --blue-dark: #0000a8;
      --blue-deep: #00007a;
      --pink:      #FF3184;
      --white:     #ffffff;
      --font:      'Metropolis', 'Segoe UI', sans-serif;
      --display:   'DM Serif Display', Georgia, serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Image background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url(https://grupoayesaa41015322.sharepoint.com/:i:/r/sites/DonBot/Documentos%20compartidos/General/Imagenes/fondo_ayesa.png?csf=1&web=1&e=acP1s7);
    }

    /* ── Login card ── */
    .login-card {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 6px;
      width: 100%;
      max-width: 360px;
      padding: 40px 36px 32px;
      box-shadow:
        0 2px 4px rgba(0,0,0,.06),
        0 8px 24px rgba(0,0,0,.12),
        0 32px 64px rgba(0,0,80,.18);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Logo area ── */
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo-title {
      font-family: var(--font);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .login-logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── Divider ── */
    .login-divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 0 -36px 24px;
    }

    /* ── Subtitle ── */
    .login-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* ── Form fields ── */
    .login-field {
      width: 100%;
      height: 42px;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 13px;
      color: #222;
      outline: none;
      margin-bottom: 10px;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }
    .login-field::placeholder { color: #bbb; }
    .login-field:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,0,208,.1);
    }

    /* ── Submit button ── */
    .login-btn {
      width: 100%;
      height: 42px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover {
      background: var(--blue-dark);
      box-shadow: 0 4px 16px rgba(0,0,208,.3);
    }
    .login-btn:active { transform: scale(.99); }

    /* Ripple on click */
    .login-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── Forgot link ── */
    .login-forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      margin-top: 10px;
      transition: color .15s;
    }
    .login-forgot:hover { color: var(--pink); text-decoration: underline; }

    /* ── Error message ── */
    .login-error {
      background: #fff0f3;
      border: 1px solid #ffc0cb;
      border-radius: 3px;
      padding: 10px 12px;
      font-size: 12px;
      color: #c00;
      margin-bottom: 12px;
      display: none;
      animation: shake .3s ease;
    }
    .login-error.visible { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    /* ── Footer logo ── */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .login-footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
    }

    .logo-wordmark {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: .06em;
    }

    .logo-wordmark span {
      color: var(--pink);
    }

    /* ── Loading state ── */
    .login-btn.loading {
      pointer-events: none;
      background: var(--blue-dark);
    }
    .login-btn.loading::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      top: 50%; left: 50%;
      margin: -8px 0 0 -8px;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

      alt="Yako" style="height:52px;width:auto;object-fit:contain;">
      
      <div class="login-logo-sub" style="margin-top:6px">Card Builder</div>
    </div>

    <hr class="login-divider">

    <p class="login-desc">Inicia sesión con tu cuenta corporativa:</p>

    <div class="login-error" id="loginError">
      Error al conectar con Microsoft. Inténtalo de nuevo.
    </div>

    <button class="login-btn" id="loginBtn" style="display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #2F2FA2;">
      <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
         <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
         <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
         <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
         <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Iniciar con Microsoft
    </button>



  </div>

  <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
  <script src="/auth-config.js"></script>

  <script>
    const msalConfig = {
        auth: {
            ...window.__MSAL_CONFIG__,
            redirectUri: `${window.location.origin}/login.html`
        }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("loginError");

    async function validarSesionMicrosoft(accessToken) {
      const respuesta = await fetch("/api/auth/validate", {
        headers: {
          Authorization: `Bearer ${accessToken}`
        }
      });

      if (!respuesta.ok) {
        throw new Error("La sesión de Microsoft no se pudo validar.");
      }

      return respuesta.json();
    }

    btn.addEventListener("click", async (e) => {
      // 1. Efecto Ripple (la animación de la gota de agua que ya tenías)
      const rect = btn.getBoundingClientRect();
      const circle = document.createElement("div");
      circle.classList.add("ripple");
      const size = Math.max(rect.width, rect.height);
      circle.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 600);

      // 2. Ocultar errores y mostrar estado de carga
      err.classList.remove("visible");
      btn.classList.add("loading");
      btn.textContent = "";

      // 3. Llamar a Microsoft
      try {
          const loginResponse = await msalInstance.loginPopup({
              scopes: ["User.Read"] // Pedimos permiso para leer el perfil básico
          });

          const validacion = await validarSesionMicrosoft(loginResponse.accessToken);

          // Si el login es correcto, guardamos el token y el nombre en memoria
          sessionStorage.setItem("yako_auth", "1");
          sessionStorage.setItem("yako_token", loginResponse.accessToken);
          sessionStorage.setItem("yako_user", validacion.user?.displayName || loginResponse.account.name);
          sessionStorage.setItem("yako_aad_id", validacion.user?.id || loginResponse.account.localAccountId);
          sessionStorage.setItem("yako_email", validacion.user?.mail || validacion.user?.userPrincipalName || loginResponse.account.username); // UPN/email real de M365
          
          // ¡Redirigimos al generador!
          window.location.href = "index.html";

      } catch (error) {
          console.error("Error en login:", error);
          // Si el usuario cierra la ventana o falla, mostramos error
          err.classList.add("visible");
          btn.classList.remove("loading");
          // Devolvemos el botón a su estado original
          btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Iniciar con Microsoft`;
      }
    });
  </script>
