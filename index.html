<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive Card Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="app-layout">

      <!-- LEFT: FORM PANEL -->
      <aside class="form-panel">
        <div class="form-panel-inner">
          <div class="brand">
            <span class="brand-dot"></span>
            <span>Card Builder</span>
          </div>

          <h1 class="form-title">Nueva tarjeta<br><span>adaptativa</span></h1>

          <form id="tarjetaForm" novalidate>

            <div class="field-group">
              <div class="field-label-row">
                <span class="field-num">01</span>
                <label for="titulo">Título *</label>
              </div>
              <input id="titulo" type="text" name="titulo" required placeholder="🚀 Nuevo lanzamiento…" />
            </div>

            <div class="field-group">
              <div class="field-label-row">
                <span class="field-num">02</span>
                <label for="imagen">Imagen cabecera</label>
              </div>
              <input id="imagen" type="url" name="imagen" placeholder="https://…" />
            </div>

            <div class="field-group">
              <div class="field-label-row">
                <span class="field-num">03</span>
                <label for="subtitulo">Subtítulo</label>
              </div>
              <input id="subtitulo" type="text" name="subtitulo" placeholder="Disponible hasta el 30 de junio…" />
            </div>

            <div class="field-group editor-group">
              <div class="field-label-row">
                <span class="field-num">04</span>
                <label>Bloques de contenido</label>
              </div>
              <div id="editor"></div>
            </div>

            <div class="field-group">
              <div class="field-label-row">
                <span class="field-num">05</span>
                <label for="canal">Canal de envío *</label>
              </div>
              <div class="select-wrapper">
                <select id="canal" name="canal" required>
                  <option value="">Selecciona un canal…</option>
                  <option value="teams">Microsoft Teams</option>
                  <option value="outlook">Outlook</option>
                </select>
                <span class="select-arrow">↓</span>
              </div>
            </div>

            <div id="emailField" class="field-group hidden">
              <div class="field-label-row">
                <span class="field-num">06</span>
                <label for="emails">Destinatarios</label>
              </div>
              <input id="emails" type="text" name="emails" placeholder="a@empresa.com; b@empresa.com" />
            </div>

            <button type="submit" class="btn-submit">
              <span>Enviar tarjeta</span>
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

          </form>
        </div>
      </aside>

      <!-- RIGHT: PREVIEW PANEL -->
      <main class="preview-panel">
        <div class="preview-header">
          <span class="preview-label">Vista previa</span>
          <div class="preview-tabs">
            <button class="tab active" data-tab="teams">Teams</button>
            <button class="tab" data-tab="outlook">Outlook</button>
          </div>
        </div>

        <div class="preview-screen">
          <!-- Teams mockup chrome -->
          <div class="app-chrome teams-chrome" id="teamsChrome">
            <div class="chrome-bar">
              <div class="chrome-dots"><span></span><span></span><span></span></div>
              <div class="chrome-title">Microsoft Teams</div>
            </div>
            <div class="teams-layout">
              <div class="teams-sidebar">
                <div class="ts-icon active"></div>
                <div class="ts-icon"></div>
                <div class="ts-icon"></div>
                <div class="ts-icon"></div>
              </div>
              <div class="teams-chat">
                <div class="chat-bubble bot">
                  <div class="bot-avatar">B</div>
                  <div class="adaptive-card" id="previewCard">
                    <!-- Preview renders here -->
                    <div class="card-placeholder">
                      <div class="ph-icon">✦</div>
                      <p>Tu tarjeta aparecerá aquí mientras la diseñas</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Outlook mockup chrome -->
          <div class="app-chrome outlook-chrome hidden" id="outlookChrome">
            <div class="chrome-bar">
              <div class="chrome-dots"><span></span><span></span><span></span></div>
              <div class="chrome-title">Outlook — Correo nuevo</div>
            </div>
            <div class="outlook-layout">
              <div class="ol-topbar">
                <span class="ol-label">Para:</span>
                <span class="ol-val" id="previewEmails">—</span>
              </div>
              <div class="ol-topbar">
                <span class="ol-label">Asunto:</span>
                <span class="ol-val" id="previewSubject">—</span>
              </div>
              <div class="ol-body">
                <div class="adaptive-card" id="previewCardOutlook">
                  <div class="card-placeholder">
                    <div class="ph-icon">✦</div>
                    <p>Tu tarjeta aparecerá aquí mientras la diseñas</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- GLOBAL RICH TEXT TOOLBAR -->
        <div class="global-toolbar" id="globalToolbar">
          <div class="gtb-inner" id="gtbInner"></div>
          <div class="gtb-hint">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>
            Selecciona un párrafo para editar · Vista previa en tiempo real
          </div>
        </div>
      </main>

    </div>

    <script src="Animaciones.js"></script>
  </body>
</html>
